apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbshop
  namespace: qbshop
  labels:
    app: qbshop
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: qbshop

  template:
    metadata:
      labels:
        app: qbshop
    spec:
      containers:
        - name: qbshop-app
          image: jyotirmoy43/qbshop-app:REPLACE_TAG
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: qbshop-config
            - secretRef:
                name: qbshop-secrets

          env:
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: qbshop-config
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: qbshop-secrets
                  key: NEXTAUTH_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qbshop-secrets
                  key: JWT_SECRET

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 25
            periodSeconds: 20
